<!-- Design & Aesthetics Section -->
<div class="design-section">
    <h3>🎨 Design & Aesthetics</h3>
    <hr class="section-divider">
    
    <div class="design-grid">
        <!-- Theme Style Dropdown -->
        <div class="input-group">
            <label for="themeStyle">Theme Style</label>
            <select id="themeStyle" onchange="changeTheme()">
                <option value="default">Default (Minimal White)</option>
                <option value="nature">Nature & Landscapes (Light Green)</option>
                <option value="ocean">Ocean Blue (Calm Blue)</option>
                <option value="sunset">Warm Sunset (Soft Orange)</option>
                <option value="dark">Tech Dark (Modern Dark)</option>
            </select>
        </div>

        <!-- Student Photo Upload (Optional) -->
        <div class="input-group">
            <label>Student Photo (Optional)</label>
            <div class="file-upload-box">
                <input type="file" id="studentPhoto" accept="image/*" onchange="handlePhotoUpload(event)">
                <span id="fileName">📁 Upload Photo</span>
            </div>
        </div>
    </div>
</div>

<!-- Footer Advertisement (Company Name) -->
<footer class="company-footer">
    <p>Powered & Designed by <span class="company-name">Marhaba Typing & Document Clearing</span></p>
</footer>
